name: Deploy backend to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'packages/**'
      - 'bun.lock'
      - 'package.json'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      IMAGE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.AR_REPO }}/${{ vars.CLOUD_RUN_SERVICE }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SA }}
          token_format: access_token

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ vars.GCP_REGION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.sha }}
            ${{ env.IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - id: deploy
        name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ vars.CLOUD_RUN_SERVICE }}
          region: ${{ vars.GCP_REGION }}
          image: ${{ env.IMAGE }}:${{ github.sha }}
          env_vars: |-
            NODE_ENV=production
            CORS_ORIGIN=${{ vars.CORS_ORIGIN }}
            AZURE_OPENAI_ENDPOINT=${{ vars.AZURE_OPENAI_ENDPOINT }}
            AZURE_OPENAI_API_VERSION=${{ vars.AZURE_OPENAI_API_VERSION }}
            OPENAI_TTT_MODEL=${{ vars.OPENAI_TTT_MODEL }}
            LIVEKIT_URL=${{ vars.LIVEKIT_URL }}
            R2_BUCKET_NAME=${{ vars.R2_BUCKET_NAME }}
            R2_ENDPOINT=${{ vars.R2_ENDPOINT }}
            ADZUNA_APP_ID=${{ vars.ADZUNA_APP_ID }}
            ADZUNA_COUNTRY=${{ vars.ADZUNA_COUNTRY }}
          secrets: |-
            DATABASE_URL=DATABASE_URL:latest
            REDIS_URL=REDIS_URL:latest
            AZURE_SECRET_KEY=AZURE_SECRET_KEY:latest
            GITHUB_PAT=GITHUB_PAT:latest
            LIVEKIT_API_KEY=LIVEKIT_API_KEY:latest
            LIVEKIT_API_SECRET=LIVEKIT_API_SECRET:latest
            R2_ACCESS_KEY_ID=R2_ACCESS_KEY_ID:latest
            R2_SECRET_ACCESS_KEY=R2_SECRET_ACCESS_KEY:latest
            AGENT_INTERNAL_SECRET=AGENT_INTERNAL_SECRET:latest
            ADZUNA_APP_KEY=ADZUNA_APP_KEY:latest
          flags: >-
            --allow-unauthenticated
            --port=8080
            --cpu=1
            --memory=512Mi
            --cpu-boost
            --min-instances=0
            --max-instances=2
            --concurrency=80
            --timeout=300

      - name: Show service URL
        run: echo "Deployed → ${{ steps.deploy.outputs.url || 'see Cloud Run console' }}"
