name: hireflow-prod
services:
  migrate:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - ./apps/backend/.env
    command: ["bunx", "--bun", "prisma", "migrate", "deploy"]
    restart: "no"

  hireflow-api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    expose:
      - "8000"
    env_file:
      - ./apps/backend/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1.5G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    networks:
      - hireflow-network

networks:
  hireflow-network:
    name: hireflow-network