name: hireflow-prod
services:
  migrate:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    env_file:
      - ./apps/backend/.env
    command: ["bunx", "--bun", "prisma", "migrate", "deploy"]
    restart: "no"

  hireflow-api:
    restart: unless-stopped
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    expose:
      - "8000"
    env_file:
      - ./apps/backend/.env
    depends_on:
      migrate:
        condition: service_completed_successfully
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1.5G
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 30s
    networks:
      - hireflow-network

  hireflow-agent:
    restart: unless-stopped
    build:
      context: ./apps/agent-worker-python
      dockerfile: Dockerfile
    env_file:
      - ./apps/agent-worker-python/.env.local
    environment:
      INTERVIEW_BACKEND_URL: http://hireflow-api:8000/api/v1
    expose:
      - "8081"
    depends_on:
      hireflow-api:
        condition: service_healthy
    stop_grace_period: 15m
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 768M
        reservations:
          cpus: "0.25"
          memory: 384M
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8081/', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 45s
    networks:
      - hireflow-network

networks:
  hireflow-network:
    name: hireflow-network
