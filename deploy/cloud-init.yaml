package_update: true
package_upgrade: true

packages:
  - ca-certificates
  - curl
  - gnupg
  - certbot
  - iptables-persistent   # provides `netfilter-persistent` (usually preinstalled on OCI Ubuntu, pinned here to be safe)

runcmd:
  # Docker Engine + Compose plugin (official apt repo, arm64)
  - install -m 0755 -d /etc/apt/keyrings
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - >
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc]
    https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable"
    | tee /etc/apt/sources.list.d/docker.list > /dev/null
  - apt-get update
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
  - usermod -aG docker ubuntu

  # webroot dir for certbot's HTTP-01 challenge (mounted read-only into nginx, see compose.prod.yml)
  - mkdir -p /var/www/certbot

  # OCI's Ubuntu images ship iptables rules that only allow SSH inbound by default —
  # open 80/443 here too, or the OCI Security List rule alone won't be enough.
  - iptables -I INPUT -p tcp --dport 80 -j ACCEPT
  - iptables -I INPUT -p tcp --dport 443 -j ACCEPT
  - netfilter-persistent save || true

final_message: "cloud-init bootstrap done: Docker + Compose + certbot installed, ports 80/443 open."
