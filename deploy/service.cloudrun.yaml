apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: hireflow-backend
  labels:
    cloud.googleapis.com/location: <REGION>
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/minScale: "0"
        autoscaling.knative.dev/maxScale: "2"
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      containerConcurrency: 80
      containers:
        - image: <REGION>-docker.pkg.dev/<PROJECT_ID>/<REPO>/hireflow-backend:latest
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "1"
              memory: 512Mi
          env:
            - name: NODE_ENV
              value: production
            - name: CORS_ORIGIN
              value: https://<frontend-domain>
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8080
            periodSeconds: 2
            timeoutSeconds: 2
            failureThreshold: 10
