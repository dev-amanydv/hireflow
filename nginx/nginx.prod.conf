events {}

http {
    upstream backend {
        server backend:8000;
    }

    # ACME HTTP-01 challenge (webroot method) + redirect everything else to HTTPS.
    # Run: certbot certonly --webroot -w /var/www/certbot \
    #   -d api.yourdomain.com -d api2.yourdomain.com -d api3.yourdomain.com
    server {
        listen 80;
        server_name api.yourdomain.com api2.yourdomain.com api3.yourdomain.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name api.yourdomain.com;

        ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;

        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }

    # Reserved for future backend #2 — add its upstream above and uncomment:
    # server {
    #     listen 443 ssl;
    #     server_name api2.yourdomain.com;
    #     ssl_certificate     /etc/letsencrypt/live/api.yourdomain.com/fullchain.pem;
    #     ssl_certificate_key /etc/letsencrypt/live/api.yourdomain.com/privkey.pem;
    #     location / {
    #         proxy_pass http://backend2;
    #         proxy_http_version 1.1;
    #         proxy_set_header Host $host;
    #         proxy_set_header X-Real-IP $remote_addr;
    #         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #         proxy_set_header X-Forwarded-Proto $scheme;
    #         proxy_set_header Upgrade $http_upgrade;
    #         proxy_set_header Connection "upgrade";
    #     }
    # }

    # Reserved for future backend #3 — same pattern as backend #2, server_name api3.yourdomain.com.
}
